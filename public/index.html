<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tau</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>τ</text></svg>">
  <!-- Using system fonts: SF Pro, SF Mono -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="mode-toggle" id="mode-toggle">
          <a href="index.html" class="mode-link active" title="Chat">τ</a>
          <a href="memoryd.html" class="mode-link" id="memoryd-link" title="Memory" style="display:none">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2C8.5 2 5 5.5 5 9.5c0 2 .8 3.8 2 5v3.5a2 2 0 002 2h6a2 2 0 002-2V14.5c1.2-1.2 2-3 2-5C19 5.5 15.5 2 12 2z"/>
              <path d="M9 21v1M15 21v1M12 2v1"/>
              <path d="M5 10h1M18 10h1"/>
              <path d="M8.5 6.5c-1 .5-1.5 1.5-1.5 3M15.5 6.5c1 .5 1.5 1.5 1.5 3"/>
              <path d="M9 14h6"/>
              <path d="M10 17h4"/>
            </svg>
          </a>
        </div>
        <input type="text" id="session-search-input" class="sidebar-search-input" placeholder="Search..." autocomplete="off" />
        <div class="sidebar-actions">
          <button class="icon-btn" id="refresh-sessions-btn" title="Refresh sessions">↻</button>
          <button class="new-session-btn" id="new-session-btn" title="New Session">+</button>
        </div>
      </div>
      <div class="session-list" id="session-list">
        <div class="session-loading">Loading sessions...</div>
      </div>
    </div>

    <!-- Sidebar overlay for mobile -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Main Chat Area -->
    <div class="main">
      <!-- Header -->
      <div class="header">
        <div class="header-left">
          <button class="sidebar-toggle" id="sidebar-toggle" title="Toggle sidebar">☰</button>
        </div>
        <div class="header-right">
          <button class="settings-btn" id="settings-btn" title="Settings">⚙</button>
          <div class="session-cost" id="session-cost" title="Session cost"></div>
          <div class="status">
            <span class="status-indicator" id="status-indicator"></span>
            <span class="status-text" id="status-text">Connecting...</span>
          </div>
        </div>
      </div>

      <!-- Messages Container -->
      <div class="messages" id="messages">
        <div class="welcome">
          <div class="welcome-icon">τ</div>
          <p>Welcome to Tau</p>
          <p class="hint">Type a message below to start chatting with Pi, or select a session from the sidebar.</p>
          <div class="shortcuts-hint">
            <span>/ Focus input</span>
            <span>Esc Abort</span>
          </div>
        </div>
      </div>

      <!-- Typing indicator -->
      <div class="typing-indicator hidden" id="typing-indicator">
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
      </div>

      <!-- Input Area -->
      <div class="input-area">
        <form id="chat-form">
          <textarea 
            id="message-input" 
            placeholder="Type a message... (Enter to send, Shift+Enter for newline)" 
            autocomplete="off"
            rows="2"
            autofocus
          ></textarea>
          <div class="input-actions">
            <button type="submit" id="send-btn" title="Send message">
              <span class="send-icon">↑</span>
            </button>
            <button type="button" id="abort-btn" class="hidden" title="Abort (Esc)">■</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Settings Overlay -->
  <div class="settings-overlay hidden" id="settings-overlay"></div>

  <!-- Settings Panel -->
  <div class="settings-panel hidden" id="settings-panel">
    <div class="settings-header">
      <h3>Theme</h3>
      <button class="settings-close" id="settings-close">✕</button>
    </div>
    <div class="theme-grid" id="theme-grid"></div>
    <button class="shuffle-btn" id="shuffle-btn">🎲 Shuffle</button>
  </div>

  <!-- Dialog Container -->
  <div id="dialog-container" class="hidden"></div>

  <!-- Scripts -->
  <script>
    fetch('/api/memoryd/check').then(r=>r.json()).then(d=>{
      if(d.installed) document.getElementById('memoryd-link').style.display='';
    }).catch(()=>{});
  </script>
  <script type="module" src="app.js"></script>
</body>
</html>
